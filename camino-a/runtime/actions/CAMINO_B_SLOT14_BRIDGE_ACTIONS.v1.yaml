openapi: 3.1.0
info:
  title: Camino B Slot 14 Subscription Worker Bridge
  version: 1.3.21-slot14-bridge-contract.1
  description: >-
    CONTRACT ONLY - NOT DEPLOYED. Versioned merge fragment for the existing
    Camino B GPT Action specification. It defines the public request, status
    and result operations for a local Claude/Codex subscription worker. Do not
    paste this file as a replacement for the existing 25-operation Camino B
    specification and do not publish these operations until the HTTPS Gateway
    handlers and outbound Mac agent have been deployed and smoke-tested.
x-camino-deployment-status: contract_only_not_deployed
x-camino-replaces-existing-spec: false
x-camino-public-actions-exclude-local-control-plane: true
servers:
  - url: https://camino-b-ultimo.marianogrammatico.com.ar
    description: Existing Camino B Gateway; the three paths below are not asserted deployed.
security:
  - ApiKeyAuth: []
paths:
  /v1/camino-b/slot14/reviews:
    post:
      operationId: requestCaminoBSlot14SubscriptionReview
      summary: Request a candidate-bound slot 14 subscription review
      description: >-
        Creates one idempotent handoff after slot 13. A successful response
        means only that the Gateway accepted the request and is waiting for a
        local Mac worker. It never means that Claude or Codex ran and never
        constitutes approval.
      x-openai-isConsequential: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Slot14ReviewRequest'
      responses:
        '200':
          description: Existing identical idempotent request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Slot14ReviewStatus'
        '202':
          description: New request accepted and waiting for the local worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Slot14ReviewStatus'
        '400':
          description: Invalid or incomplete hash binding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Idempotency conflict or stale candidate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/camino-b/slot14/reviews/{handoff_id}:
    get:
      operationId: getCaminoBSlot14SubscriptionReviewStatus
      summary: Read the hash-bound slot 14 handoff status
      description: >-
        Returns the transport state and operator action. The caller must send
        the exact candidate SHA so a stale conversation cannot read or advance
        a newer review.
      parameters:
        - in: path
          name: handoff_id
          required: true
          schema:
            type: string
            pattern: '^B14_[a-f0-9]{32}$'
        - in: query
          name: candidate_sha256
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{64}$'
      responses:
        '200':
          description: Current bridge state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Slot14ReviewStatus'
        '404':
          description: Handoff not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Candidate SHA does not match the handoff
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/camino-b/slot14/reviews/{handoff_id}/result:
    get:
      operationId: getCaminoBSlot14SubscriptionReviewResult
      summary: Read a validated worker receipt and DONE evidence
      description: >-
        Returns a result only after the local bridge validates the worker
        bundle, manifest, DONE marker, claim and candidate SHA. Even then,
        completed means transport completed; the canonical terminal gate must
        independently decide whether approval is eligible.
      parameters:
        - in: path
          name: handoff_id
          required: true
          schema:
            type: string
            pattern: '^B14_[a-f0-9]{32}$'
        - in: query
          name: candidate_sha256
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{64}$'
      responses:
        '200':
          description: Current result readiness or validated receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Slot14ReviewResult'
        '404':
          description: Handoff not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Candidate SHA mismatch or receipt integrity failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Sha256:
      type: string
      pattern: '^[a-f0-9]{64}$'
    Slot14ReviewRequest:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - path_id
        - run_id
        - slot_id
        - source_slot_id
        - candidate_sha256
        - prior_slots_complete
        - request_path
        - request_sha256
        - slot14_audit_request_ref
        - slot14_audit_request_sha256
        - diff_path
        - diff_sha256
        - idempotency_key
      properties:
        schema_version:
          type: string
          enum: [camino_b_slot14_review_request.v1]
        path_id:
          type: string
          enum: [camino_b]
        run_id:
          type: string
          pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,199}$'
        slot_id:
          type: string
          enum: ['14']
        source_slot_id:
          type: string
          enum: ['13']
        candidate_sha256:
          $ref: '#/components/schemas/Sha256'
        prior_slots_complete:
          type: boolean
          enum: [true]
        request_path:
          type: string
          minLength: 1
          maxLength: 500
        request_sha256:
          $ref: '#/components/schemas/Sha256'
        slot14_audit_request_ref:
          type: string
          minLength: 1
          maxLength: 500
        slot14_audit_request_sha256:
          $ref: '#/components/schemas/Sha256'
        diff_path:
          type: string
          minLength: 1
          maxLength: 500
        diff_sha256:
          $ref: '#/components/schemas/Sha256'
        idempotency_key:
          type: string
          pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{15,127}$'
        metadata:
          type: object
    Slot14ReviewStatus:
      type: object
      required:
        - status
        - handoff_id
        - run_id
        - slot_id
        - candidate_sha256
        - request_sha256
        - diff_sha256
        - bridge_request_sha256
        - fallback_armed
        - result_ready
        - terminal_approval
        - requires_terminal_gate_validation
      properties:
        status:
          type: string
          enum: [awaiting_slot14_local_worker, claimed, completed, blocked]
        handoff_id:
          type: string
          pattern: '^B14_[a-f0-9]{32}$'
        run_id:
          type: string
        slot_id:
          type: string
          enum: ['14']
        candidate_sha256:
          $ref: '#/components/schemas/Sha256'
        request_path:
          type: string
        request_sha256:
          $ref: '#/components/schemas/Sha256'
        diff_path:
          type: string
        diff_sha256:
          $ref: '#/components/schemas/Sha256'
        bridge_request_sha256:
          $ref: '#/components/schemas/Sha256'
        revision:
          type: integer
          minimum: 1
        fallback_armed:
          type: boolean
        result_ready:
          type: boolean
        operator_action:
          type: [string, 'null']
        terminal_approval:
          type: boolean
          enum: [false]
        requires_terminal_gate_validation:
          type: boolean
          enum: [true]
    Slot14ReviewResult:
      type: object
      required:
        - status
        - handoff_id
        - candidate_sha256
        - result_ready
        - terminal_approval
        - requires_terminal_gate_validation
      properties:
        status:
          type: string
        handoff_id:
          type: string
        candidate_sha256:
          $ref: '#/components/schemas/Sha256'
        result_ready:
          type: boolean
        transport_completed:
          type: boolean
        terminal_approval:
          type: boolean
          enum: [false]
        requires_terminal_gate_validation:
          type: boolean
          enum: [true]
        completion:
          type: object
    Error:
      type: object
      required: [status, error]
      properties:
        status:
          type: string
          enum: [error]
        error:
          type: string
